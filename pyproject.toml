[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]
ignore = ["E501", "B008", "N999", "SIM108", "UP006", "UP007"]
exclude = ["alembic/", "*.pyi", "notebooks/"]

[tool.ruff.isort]
known-first-party = ["app", "ml"]

[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''/(alembic|\.git|\.venv|node_modules|notebooks)/'''

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
disallow_untyped_defs = false
warn_return_any = false
exclude = ["alembic/", "tests/", "notebooks/"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
filterwarnings = ["ignore::DeprecationWarning", "ignore::UserWarning"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["app", "ml"]
omit = ["*/tests/*", "*/alembic/*", "*/notebooks/*"]

[tool.coverage.report]
exclude_lines = ["pragma: no cover", "def __repr__", "raise NotImplementedError", "if TYPE_CHECKING:"]
