# ================================================================
# Docker Compose - Development Environment
# 360° Construction Intelligence Engine
# ================================================================
version: "3.9"

x-common-env: &common-env
  ENVIRONMENT: development
  DEBUG: "true"
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  POSTGRES_DB: panoramic360
  POSTGRES_USER: panoramic
  POSTGRES_PASSWORD: dev_password_change_me
  DATABASE_URL: postgresql+asyncpg://panoramic:dev_password_change_me@postgres:5432/panoramic360
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  MINIO_ENDPOINT: http://minio:9000
  S3_ENDPOINT_URL: http://minio:9000
  S3_ACCESS_KEY_ID: panoramic_admin
  S3_SECRET_ACCESS_KEY: panoramic_dev_secret
  MLFLOW_TRACKING_URI: http://mlflow:5000
  SECRET_KEY: dev-secret-key-not-for-production-use
  LOG_LEVEL: DEBUG

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: panoramic360
      POSTGRES_USER: panoramic
      POSTGRES_PASSWORD: dev_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panoramic -d panoramic360"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO Object Storage ────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: panoramic_admin
      MINIO_ROOT_PASSWORD: panoramic_dev_secret
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── MinIO bucket setup ──────────────────────────────────────
  minio_setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 panoramic_admin panoramic_dev_secret &&
      mc mb --ignore-existing minio/panoramas-raw &&
      mc mb --ignore-existing minio/panoramas-processed &&
      mc mb --ignore-existing minio/analysis-outputs &&
      mc mb --ignore-existing minio/model-weights &&
      echo 'Buckets ready'
      "

  # ── FastAPI Backend ─────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
      target: runtime
    environment:
      <<: *common-env
    volumes:
      - ../backend/app:/app/app
      - ../ml:/app/ml
      - ../configs:/app/configs
      - model_weights:/app/ml/models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Celery Worker (GPU) ─────────────────────────────────────
  celery_worker:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
      target: runtime
    environment:
      <<: *common-env
    volumes:
      - ../backend/app:/app/app
      - ../ml:/app/ml
      - model_weights:/app/ml/models
    depends_on:
      - api
    command: >
      celery -A app.core.celery_app:celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=high_priority,analytics,gpu_heavy,celery
      --hostname=worker@%h
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ── Celery Flower (monitoring) ──────────────────────────────
  flower:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
      target: runtime
    environment:
      <<: *common-env
    command: celery -A app.core.celery_app:celery_app flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - redis

  # ── Frontend ────────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
      target: runtime
    ports:
      - "3000:3000"
    depends_on:
      - api

  # ── MLflow ──────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: panoramic_admin
      AWS_SECRET_ACCESS_KEY: panoramic_dev_secret
    command: >
      mlflow server
      --backend-store-uri postgresql://panoramic:dev_password_change_me@postgres:5432/panoramic360
      --default-artifact-root s3://model-weights/mlflow
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  model_weights:

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
