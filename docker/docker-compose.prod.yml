# ================================================================
# Docker Compose - Production (CPU)
# ================================================================
version: "3.9"

x-common-env: &common-env
  ENVIRONMENT: production
  DEBUG: "false"
  LOG_LEVEL: INFO

services:
  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:3000"
      - "443:3000"
    depends_on:
      - api
      - frontend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-panoramic360}
      POSTGRES_USER: ${POSTGRES_USER:-panoramic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-panoramic}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 4gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  api:
    image: ${REGISTRY:-ghcr.io/your-org}/panoramic-360-engine-api:${TAG:-latest}
    environment:
      <<: *common-env
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --loop uvloop
    volumes:
      - model_weights:/app/ml/models:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery_worker:
    image: ${REGISTRY:-ghcr.io/your-org}/panoramic-360-engine-api:${TAG:-latest}
    environment:
      <<: *common-env
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
    command: >
      celery -A app.core.celery_app:celery_app worker
      --loglevel=info --concurrency=4
      --queues=high_priority,analytics,gpu_heavy,celery
    volumes:
      - model_weights:/app/ml/models:ro
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      replicas: 2

  frontend:
    image: ${REGISTRY:-ghcr.io/your-org}/panoramic-360-engine-frontend:${TAG:-latest}
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  model_weights:
